<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>ViciMart – Grocery &amp; Essentials at Your Vicinity</title>

  <meta name="description"
        content="Local grocery and essentials store at your vicinity offering in-store shopping, online ordering and local delivery. Launching soon.">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">


  <style>
    :root {
      --text-primary: #000000;
      --text-secondary: #444444;
      --text-muted: #666666;
      --background: #ffffff;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--background);
      color: var(--text-primary);
       font-family: system-ui, -apple-system, BlinkMacSystemFont,
                   "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    

    main {
      max-width: 720px;
      margin: 80px auto 40px;
      padding: 0 14px;
      text-align: center;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .tagline {
      font-size: 1.2rem;
      font-weight: 400;
      color: var(--text-secondary);
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .capabilities {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .philosophy {
      font-size: 0.85rem;
      font-style: italic;
      color: var(--text-secondary);
      margin-bottom: 40px;
    }

    .launch {
      font-size: 1.5rem;
      color: var(--text-muted);
    }
  </style>
</head>

<body>
  <main>
    <h1>ViciMart</h1>

    <div class="tagline">
      Grocery &amp; Essentials, at Your Vicinity
    </div>

    <div class="capabilities">
      Order Online • In-store Shopping • Local Delivery
    </div>

    <div class="philosophy">
      Run by People. Powered by Tech.
    </div>

    <div class="launch">
      Launching Soon
    </div>
  </main>
</body>
</html>
